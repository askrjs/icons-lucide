name: Publish Package

on:
  workflow_dispatch: {}

permissions:
  contents: write
  packages: read

jobs:
  ci:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      id-token: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
